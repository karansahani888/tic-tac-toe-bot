services:
  - type: web
    name: tic-tac-toe-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:flask_app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: BOT_TOKEN
        value: 8985690585:AAGobmNJJ3hTlk6ZZllsEjd77LuAyIDIPjE
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: WEBHOOK_URL
        sync: false  # You will set this after first deploy
